<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tier List</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body class="tabla-page">
    <div id="menu-root"></div>
    <main class="contenedor">
        <h1>Tier List</h1>
        <p class="subtitulo">Ranking de los mejores Memes de Gatos</p>
        <table>
            <tr>
                <th>Tier</th>
                <th>Elementos</th>
            </tr>
            <tr class="tier-s">
                <td>S</td>
                <td class="elementos">
                    <img src="img/cats/rigby.png" alt="Rigby" width="150px" height="150px">
                    <img src="img/cats/demon.png" alt="demon" width="150px" height="150px">
                    <img src="img/cats/whereiam.png" alt="whereiam" width="150px" height="150px">
                </td>
            </tr>
            <tr class="tier-a">
                <td>A</td>
                <td class="elementos">
                    <img src="img/cats/front_cat.png" alt="Front_cat" width="150px" height="150px">
                    <img src="img/cats/steve.png" alt="steve" width="150px" height="150px">
                    <img src="img/cats/black.png" alt="black" width="150px" height="150px">
                    <img src="img/cats/smile.png" alt="smile" width="150px" height="150px">
                    <img src="img/cats/cleric.png" alt="cleric" width="150px" height="150px">
                </td>
            </tr>
            <tr class="tier-b">
                <td>B</td>
                <td class="elementos">
                    <img src="img/cats/fingerupcat.png" alt="fingerupcat" width="150px" height="150px">
                    <img src="img/cats/eyesopen.png" alt="eyesopen" width="150px" height="150px">
                    <img src="img/cats/myears.png" alt="myears" width="150px" height="150px">
                </td>
            </tr>
            <tr class="tier-c">
                <td>C</td>
                <td class="elementos">
                    <img src="img/cats/judge.png" alt="judge" width="150px" height="150px">
                    <img src="img/cats/cute.png" alt="cute" width="150px" height="150px">

                </td>
            </tr>
            <tr class="tier-d">
                <td>D</td>
                <td class="elementos">
                    <img src="img/cats/larry.png" alt="larry" width="150px" height="150px">
                </td>
            </tr>
        </table>
    </main>
    <div id="footer-root"></div>
    <script type="module">
    import { renderMenu } from "./Componentes/menu.js";
    import { renderFooter } from "./Componentes/footer.js";
    renderMenu("menu-root");
    renderFooter("footer-root");
    </script>
</body>
</html>
