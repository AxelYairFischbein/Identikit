<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Contacto</title>
    <link rel="icon" type="image/jpeg" href="img/manprofile.png">
    <link rel="stylesheet" href="style.css">
    <style>
        .card-contacto-page {
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at 12% 12%, rgba(242, 232, 207, 0.95) 0%, rgba(242, 232, 207, 0) 34%),
                radial-gradient(circle at 88% 18%, rgba(188, 71, 73, 0.18) 0%, rgba(188, 71, 73, 0) 30%),
                linear-gradient(160deg, var(--verde-claro) 0%, #94bf49 32%, var(--verde-medio) 74%, var(--verde-oscuro) 100%);
        }

        .card-contacto-wrap {
            width: min(780px, calc(100% - 32px));
            margin: 28px auto;
        }

        .card-contacto {
            background: linear-gradient(180deg, rgba(242, 232, 207, 0.97), rgba(242, 232, 207, 0.92));
            border: 3px solid rgba(56, 102, 65, 0.9);
            border-radius: 22px;
            box-shadow: 0 16px 34px rgba(32, 63, 41, 0.28);
            padding: 26px;
        }

        .card-contacto h1 {
            margin: 0;
            text-align: left;
            color: var(--rojo);
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }

        .card-contacto-sub {
            margin: 8px 0 18px;
            color: var(--verde-oscuro);
            font-weight: 700;
        }

        .datos-contacto {
            display: grid;
            grid-template-columns: 140px 1fr;
            gap: 12px;
            align-items: center;
        }

        .dato-label {
            font-weight: 800;
            color: var(--verde-oscuro);
        }

        .dato-valor {
            color: #25472f;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(56, 102, 65, 0.28);
            border-radius: 10px;
            padding: 10px 12px;
        }

        .dato-valor.telefono {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .telefono-texto {
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .phone-toggle {
            border: 1px solid rgba(56, 102, 65, 0.35);
            background: rgba(255, 255, 255, 0.85);
            color: var(--verde-oscuro);
            border-radius: 999px;
            padding: 6px 10px;
            font-weight: 700;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.18s ease, background-color 0.18s ease;
        }

        .phone-toggle:hover {
            transform: translateY(-1px);
            background: rgba(167, 201, 87, 0.3);
        }

        .phone-toggle:focus-visible {
            outline: 3px solid rgba(106, 153, 78, 0.35);
            outline-offset: 2px;
        }

        .eye-icon {
            position: relative;
            width: 18px;
            height: 12px;
            border: 2px solid currentColor;
            border-radius: 12px / 9px;
            display: inline-block;
        }

        .eye-icon::before {
            content: "";
            position: absolute;
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .phone-toggle[aria-pressed="false"] .eye-icon::after {
            content: "";
            position: absolute;
            width: 22px;
            height: 2px;
            background: currentColor;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-28deg);
            border-radius: 2px;
        }

        .dato-valor a {
            color: var(--verde-oscuro);
            font-weight: 700;
            text-decoration: none;
        }

        .dato-valor a:hover {
            color: var(--rojo);
            text-decoration: underline;
        }

        @media (max-width: 640px) {
            .card-contacto-wrap {
                width: min(780px, calc(100% - 20px));
                margin: 18px auto;
            }

            .card-contacto {
                padding: 18px;
                border-radius: 16px;
            }

            .datos-contacto {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }
    </style>
</head>
<body class="card-contacto-page">
    <div id="menu-root"></div>

    <main class="card-contacto-wrap">
        <section class="card-contacto">
            <h1>Tarjeta de contacto</h1>
            <p class="card-contacto-sub">Informacion de contacto personal</p>

            <div class="datos-contacto">
                <span class="dato-label">Nombre</span>
                <span class="dato-valor">Axel Fischbein</span>

                <span class="dato-label">Mail</span>
                <span class="dato-valor">axelfischbein@gmail.com</span>

                <span class="dato-label">LinkedIn</span>
                <span class="dato-valor">
                    <a href="https://www.linkedin.com/in/axelfischbein/" target="_blank" rel="noopener noreferrer">
                        linkedin.com/in/axelfischbein
                    </a>
                </span>

                <span class="dato-label">Telefono</span>
                <span class="dato-valor telefono">
                    <span id="telefono-texto" class="telefono-texto" data-full-phone="+54 9 11 31694814">+** * ** ********</span>
                    <button id="telefono-toggle" type="button" class="phone-toggle" aria-pressed="false" aria-label="Mostrar telefono">
                        <span class="eye-icon" aria-hidden="true"></span>
                        <span id="telefono-toggle-label">Mostrar</span>
                    </button>
                </span>
            </div>
        </section>
    </main>

    <div id="footer-root"></div>

    <script type="module">
        import { renderMenu } from "./Componentes/menu.js";
        import { renderFooter } from "./Componentes/footer.js";

        renderMenu("menu-root");
        renderFooter("footer-root");

        const telefonoTexto = document.getElementById("telefono-texto");
        const telefonoToggle = document.getElementById("telefono-toggle");
        const telefonoToggleLabel = document.getElementById("telefono-toggle-label");

        if (telefonoTexto && telefonoToggle && telefonoToggleLabel) {
            const telefonoCompleto = telefonoTexto.dataset.fullPhone ?? "+54 9 11 31694814";
            const telefonoOculto = "+** * ** ********";

            telefonoToggle.addEventListener("click", () => {
                const visible = telefonoToggle.getAttribute("aria-pressed") === "true";
                const mostrar = !visible;

                telefonoTexto.textContent = mostrar ? telefonoCompleto : telefonoOculto;
                telefonoToggle.setAttribute("aria-pressed", mostrar ? "true" : "false");
                telefonoToggle.setAttribute("aria-label", mostrar ? "Ocultar telefono" : "Mostrar telefono");
                telefonoToggleLabel.textContent = mostrar ? "Ocultar" : "Mostrar";
            });
        }
    </script>
</body>
</html>
