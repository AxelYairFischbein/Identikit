<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist Favorita</title>
    <link rel="icon" type="image/jpeg" href="img/manprofile.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="playlist-page has-menu">
    <div id="menu-root"></div>

    <main class="playlist-contenedor" aria-label="Contenido multimedia">
        <header class="playlist-hero">
            <h1>Mi Playlist Favorita</h1>
            <p class="playlist-intro">Esta página reúne la música que suelo escuchar para programar, estudiar y relajarme.</p>
        </header>

        <section class="playlist-grid" aria-label="Secciones de musica">
            <input class="song-toggle" type="radio" name="song" id="song-1" checked>
            <input class="song-toggle" type="radio" name="song" id="song-2">
            <input class="song-toggle" type="radio" name="song" id="song-3">
            <input class="song-toggle" type="radio" name="song" id="song-4">
            <input class="song-toggle" type="radio" name="song" id="song-5">

            <article class="playlist-card" aria-label="Playlist en Spotify">
                <h2>Playlist Principal</h2>
                <p>Estas canciones me acompañan mientras codeo y curso en la facu.</p>
                <div class="playlist-subsection">
                    <h3>Top 5 Canciones Favoritas</h3>
                    <ol class="playlist-songs">
                        <li><label for="song-1" class="song-link">Tan Solo - Los Piojos</label></li>
                        <li><label for="song-2" class="song-link">GigaChad Theme - Phonk</label></li>
                        <li><label for="song-3" class="song-link">La Bamba - Los Lobos</label></li>
                        <li><label for="song-4" class="song-link">Need 2 - Pinegrove</label></li>
                        <li><label for="song-5" class="song-link">End of Beginning - Djo</label></li>
                    </ol>
                </div>
            </article>

            <article class="playlist-card playlist-current" aria-label="Tema favorito del momento">
                <h2>Mis temas favoritos:</h2>
                <p>Estos son los temas que más escucho en este momento.</p>
                <div class="playlist-subsection playlist-now">
                    <iframe class="playlist-embed song-video song-video-1" src="Videos/cancion2.html" title="Tan Solo - Los Piojos" loading="lazy"></iframe>
                    <iframe class="playlist-embed song-video song-video-2" src="Videos/cancion1.html" title="GigaChad Theme - Phonk" loading="lazy"></iframe>
                    <iframe class="playlist-embed song-video song-video-3" src="Videos/cancion3.html" title="Enamorado Tuyo - El Cuarteto de Nos" loading="lazy"></iframe>
                    <iframe class="playlist-embed song-video song-video-4" src="Videos/cancion4.html" title="Need 2 - Pinegrove" loading="lazy"></iframe>
                    <iframe class="playlist-embed song-video song-video-5" src="Videos/cancion5.html" title="End of Beginning - Djo" loading="lazy"></iframe>
                </div>
            </article>
        </section>
    </main>

    <div id="footer-root"></div>

    <script type="module">
        import { renderMenu } from "./Componentes/menu.js";
        import { renderFooter } from "./Componentes/footer.js";

        renderMenu("menu-root");
        renderFooter("footer-root");
    </script>
</body>
</html>
